services:
  backend:
    build: ./backend
    volumes:
      - ./backend:/app
    environment:
      ENV: dev
      LOG_LEVEL: DEBUG
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  web:
    build: ./web
    volumes:
      - ./web:/app
      - /app/node_modules
      - /app/.next
    environment:
      NODE_ENV: development
    command: pnpm dev
