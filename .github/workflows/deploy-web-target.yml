name: deploy-web-target

# Einmaliger / manueller Deploy der Web-App auf ein bestimmtes Vercel-Projekt
# (per Project-ID). Lässt die reguläre deploy-web-Pipeline unberührt.
# Die Org-ID wird zur Laufzeit aus der Project-ID über die Vercel-API abgeleitet,
# daher genügt das vorhandene VERCEL_TOKEN-Secret.

on:
  workflow_dispatch:
    inputs:
      project_id:
        description: "Vercel Project ID (prj_...)"
        required: true
        default: "prj_0zwtc7YwIsxeJ0Yg1iH1jdmG1gox"
      target:
        description: "production oder preview"
        required: true
        default: "production"

jobs:
  deploy:
    name: Deploy to target Vercel project
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-web-target-${{ github.event.inputs.project_id }}
      cancel-in-progress: true
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_PROJECT_ID: ${{ github.event.inputs.project_id }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Resolve org and deploy
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
        run: |
          set -o pipefail

          # Org-/Account-ID aus der Project-ID ableiten (prüft zugleich den Token-Zugriff).
          PROJ_JSON=$(curl -s -H "Authorization: Bearer $VERCEL_TOKEN" \
            "https://api.vercel.com/v9/projects/$VERCEL_PROJECT_ID")
          ORG_ID=$(echo "$PROJ_JSON" | jq -r '.accountId // empty')
          PROJ_NAME=$(echo "$PROJ_JSON" | jq -r '.name // empty')
          if [ -z "$ORG_ID" ]; then
            echo "::error::Konnte Org-ID nicht ermitteln – Token hat evtl. keinen Zugriff auf $VERCEL_PROJECT_ID."
            echo "$PROJ_JSON" | head -c 600
            exit 1
          fi
          export VERCEL_ORG_ID="$ORG_ID"
          echo "Ziel-Projekt: $PROJ_NAME ($VERCEL_PROJECT_ID), Org $ORG_ID"

          if [ "${{ github.event.inputs.target }}" = "production" ]; then
            ENV_NAME="production"; PROD_FLAG="--prod"
          else
            ENV_NAME="preview"; PROD_FLAG=""
          fi

          # NEXT_PUBLIC_*-Werte für den Build (Platzhalter, falls Secrets leer sind).
          # Die BIT-Website nutzt selbst kein Supabase; nicht-leere Werte genügen.
          export NEXT_PUBLIC_SUPABASE_URL="${NEXT_PUBLIC_SUPABASE_URL:-https://example.supabase.co}"
          export NEXT_PUBLIC_SUPABASE_ANON_KEY="${NEXT_PUBLIC_SUPABASE_ANON_KEY:-placeholder-anon-key}"
          export NEXT_PUBLIC_API_URL="${NEXT_PUBLIC_API_URL:-http://localhost:8000}"

          # Das Ziel-Projekt hat als Root-Directory das Repo-Root konfiguriert; die
          # Next-App liegt aber in web/. Daher aus web/ heraus bauen, damit npm die
          # package.json findet (sonst ENOENT -> npm exit 254).
          cd web

          # Prebuilt-Deploy: Wir bauen die App auf dem Runner (npm funktioniert hier
          # zuverlässig) und laden nur das fertige .vercel/output hoch. Damit wird das
          # Install/Build-Setup des Ziel-Projekts vollständig umgangen.
          vercel pull --yes --environment="$ENV_NAME" --token="$VERCEL_TOKEN"
          vercel build $PROD_FLAG --token="$VERCEL_TOKEN"
          vercel deploy --prebuilt $PROD_FLAG --yes --token="$VERCEL_TOKEN" 2>&1 | tee deploy.log

          url=$(grep -Eo 'https://[a-zA-Z0-9.-]+\.vercel\.app' deploy.log | tail -1)
          echo "DEPLOY_URL=$url"
          echo "## Deployed → $PROJ_NAME" >> "$GITHUB_STEP_SUMMARY"
          echo "- URL: ${url}" >> "$GITHUB_STEP_SUMMARY"
          echo "- BIT-Website: ${url}/bit" >> "$GITHUB_STEP_SUMMARY"
