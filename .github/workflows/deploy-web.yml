name: deploy-web

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "web/**"
      - "shared/**"
      - ".github/workflows/deploy-web.yml"

jobs:
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-web
      cancel-in-progress: true
    defaults:
      run:
        working-directory: web
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Deploy
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
        run: |
          url=$(vercel deploy --prod --yes \
            --token="$VERCEL_TOKEN" \
            --name=handwerk-saas \
            --build-env NEXT_PUBLIC_SUPABASE_URL="$NEXT_PUBLIC_SUPABASE_URL" \
            --build-env NEXT_PUBLIC_SUPABASE_ANON_KEY="$NEXT_PUBLIC_SUPABASE_ANON_KEY" \
            --build-env NEXT_PUBLIC_API_URL="$NEXT_PUBLIC_API_URL" \
            --env NEXT_PUBLIC_SUPABASE_URL="$NEXT_PUBLIC_SUPABASE_URL" \
            --env NEXT_PUBLIC_SUPABASE_ANON_KEY="$NEXT_PUBLIC_SUPABASE_ANON_KEY" \
            --env NEXT_PUBLIC_API_URL="$NEXT_PUBLIC_API_URL" 2>&1 | tail -1)
          echo "DEPLOY_URL=$url"
          echo "## Deployed to" >> $GITHUB_STEP_SUMMARY
          echo "$url" >> $GITHUB_STEP_SUMMARY
