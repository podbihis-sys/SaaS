name: deploy-web

on:
  workflow_dispatch:
    inputs:
      production:
        description: "Auf Produktion (stabile URL) deployen"
        type: boolean
        default: false
  push:
    branches: [main]
    paths:
      - "web/**"
      - "shared/**"
      - ".github/workflows/deploy-web.yml"

jobs:
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-web
      cancel-in-progress: true
    defaults:
      run:
        working-directory: web
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Deploy
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          PRODUCTION: ${{ inputs.production }}
        run: |
          set -o pipefail
          # main oder production-Input -> Produktion (stabile URL), sonst Preview.
          if [ "$GITHUB_REF_NAME" = "main" ] || [ "$PRODUCTION" = "true" ]; then
            PROD_FLAG="--prod"
          else
            PROD_FLAG=""
          fi
          # Fallback auf Platzhalter, falls Secrets nicht gesetzt sind. Der Build
          # benoetigt nicht-leere NEXT_PUBLIC_*-Werte; die BIT-Website nutzt selbst
          # kein Supabase, daher genuegen Platzhalter fuer ein lauffaehiges Preview.
          # Öffentliche (browser-sichere) Defaults für das pruefpilot-Supabase-Projekt;
          # ein gleichnamiges GitHub-Secret überschreibt sie, wenn gesetzt.
          SUPA_URL="${NEXT_PUBLIC_SUPABASE_URL:-https://otsavbpvfzkytlouklwe.supabase.co}"
          SUPA_KEY="${NEXT_PUBLIC_SUPABASE_ANON_KEY:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im90c2F2YnB2ZnpreXRsb3VrbHdlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyNjMwMTcsImV4cCI6MjA5NjgzOTAxN30.THaVh8ZYdiW0oebp-vmt0N2MsjoW7Xlfr4lhTDRmaGg}"
          API_URL="${NEXT_PUBLIC_API_URL:-http://localhost:8000}"
          # Eigene BIT-Supabase-Instanz (oeffentliche Werte; Secrets ueberschreiben).
          BIT_URL="${NEXT_PUBLIC_BIT_SUPABASE_URL:-https://lhllsywxusrqtxcpnjbo.supabase.co}"
          BIT_KEY="${NEXT_PUBLIC_BIT_SUPABASE_ANON_KEY:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxobGxzeXd4dXNycXR4Y3BuamJvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0OTY3NjEsImV4cCI6MjA5NzA3Mjc2MX0.hbqQU6MlbP7VJUpPdx9kTyqnGLW67702J8Us657iPG0}"
          vercel deploy $PROD_FLAG --yes \
            --token="$VERCEL_TOKEN" \
            --build-env NEXT_PUBLIC_SUPABASE_URL="$SUPA_URL" \
            --build-env NEXT_PUBLIC_SUPABASE_ANON_KEY="$SUPA_KEY" \
            --build-env NEXT_PUBLIC_API_URL="$API_URL" \
            --env NEXT_PUBLIC_SUPABASE_URL="$SUPA_URL" \
            --env NEXT_PUBLIC_SUPABASE_ANON_KEY="$SUPA_KEY" \
            --env NEXT_PUBLIC_API_URL="$API_URL" \
            --build-env NEXT_PUBLIC_BIT_SUPABASE_URL="$BIT_URL" \
            --build-env NEXT_PUBLIC_BIT_SUPABASE_ANON_KEY="$BIT_KEY" \
            --env NEXT_PUBLIC_BIT_SUPABASE_URL="$BIT_URL" \
            --env NEXT_PUBLIC_BIT_SUPABASE_ANON_KEY="$BIT_KEY" 2>&1 | tee deploy.log
          url=$(grep -Eo 'https://[a-zA-Z0-9.-]+\.vercel\.app' deploy.log | tail -1)
          echo "DEPLOY_URL=$url"
          echo "## Deployed ($GITHUB_REF_NAME)" >> $GITHUB_STEP_SUMMARY
          echo "- BIT-Website: ${url}/bit" >> $GITHUB_STEP_SUMMARY
          echo "- Root: ${url}" >> $GITHUB_STEP_SUMMARY
