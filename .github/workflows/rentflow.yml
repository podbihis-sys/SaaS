name: rentflow

on:
  push:
    paths:
      - "rentflow/**"
      - ".github/workflows/rentflow.yml"
  pull_request:
    paths:
      - "rentflow/**"
      - ".github/workflows/rentflow.yml"

jobs:
  ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rentflow
    env:
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-anon-key
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: rentflow/package-lock.json

      - name: Install
        run: npm ci

      - name: Unit tests
        run: npm test

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
