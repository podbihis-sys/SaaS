name: deploy-server

# Deploys the self-hosted stack to your own Linux server over SSH.
#
# Requires these repository secrets:
#   SERVER_HOST  – server IP or hostname
#   SERVER_USER  – SSH user (must be able to run docker compose)
#   SSH_KEY      – private SSH key (PEM) authorised for SERVER_USER
# Optional repository variables:
#   SERVER_PATH  – checkout dir on the server (default: /opt/bit)
#   SERVER_PORT  – SSH port (default: 22)
#
# The server must already have the repo cloned at SERVER_PATH with a populated
# .env.selfhost (see docs/self-hosting.md). This workflow pulls the branch,
# rebuilds the web image and restarts the stack.

on:
  workflow_dispatch:
  push:
    branches: [claude/bit-self-hosted-docker-ott5x6]
    paths:
      - "web/**"
      - "shared/**"
      - "docker-compose.selfhost.yml"
      - "caddy/**"
      - "volumes/**"
      - ".github/workflows/deploy-server.yml"

concurrency:
  group: deploy-server
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy over SSH
    runs-on: ubuntu-latest
    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "${SERVER_PORT}" -H "${{ secrets.SERVER_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null
        env:
          SERVER_PORT: ${{ vars.SERVER_PORT || '22' }}

      - name: Pull and restart stack
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_PATH: ${{ vars.SERVER_PATH || '/opt/bit' }}
          SERVER_PORT: ${{ vars.SERVER_PORT || '22' }}
          BRANCH: ${{ github.ref_name }}
        run: |
          ssh -i ~/.ssh/deploy_key -p "$SERVER_PORT" "$SERVER_USER@$SERVER_HOST" bash -s <<EOF
            set -euo pipefail
            cd "$SERVER_PATH"
            git fetch origin "$BRANCH"
            git checkout "$BRANCH"
            git reset --hard "origin/$BRANCH"
            docker compose -f docker-compose.selfhost.yml --env-file .env.selfhost pull
            docker compose -f docker-compose.selfhost.yml --env-file .env.selfhost up -d --build
            docker compose -f docker-compose.selfhost.yml --env-file .env.selfhost ps
            docker image prune -f
          EOF

      - name: Summary
        run: echo "Deployed branch ${{ github.ref_name }} to ${{ secrets.SERVER_HOST }}" >> "$GITHUB_STEP_SUMMARY"
