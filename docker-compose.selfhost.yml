# =============================================================================
# Self-hosted production stack for the BIT website + its own Supabase instance.
#
#   docker compose -f docker-compose.selfhost.yml --env-file .env.selfhost up -d
#
# Includes:
#   - caddy     reverse proxy with automatic HTTPS (Let's Encrypt)
#   - web       Next.js production server (`next start`)
#   - kong      Supabase API gateway (auth / rest / storage / meta)
#   - auth      GoTrue (authentication)
#   - rest      PostgREST (auto REST API + RLS)
#   - storage   Storage API, backed by a local filesystem volume
#   - imgproxy  image transformations for the storage API
#   - meta      postgres-meta (used by Studio)
#   - studio    Supabase Studio (optional admin UI, behind Caddy basic auth)
#   - db        Postgres (supabase/postgres, ships the required roles/extensions)
#
# Image versions are pinned below. The canonical, tested combination lives in
# the official https://github.com/supabase/supabase /docker directory — if an
# image fails to pull, align these tags with that repo's docker-compose.yml.
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Reverse proxy + automatic HTTPS
  # ---------------------------------------------------------------------------
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - web
      - kong
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      SITE_DOMAIN: ${SITE_DOMAIN}
      API_DOMAIN: ${API_DOMAIN}
      STUDIO_DOMAIN: ${STUDIO_DOMAIN:-}
      ACME_EMAIL: ${ACME_EMAIL}
      STUDIO_BASIC_AUTH_USER: ${STUDIO_BASIC_AUTH_USER:-admin}
      STUDIO_BASIC_AUTH_HASH: ${STUDIO_BASIC_AUTH_HASH:-}
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:80"]
      interval: 30s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Next.js (BIT website) – production server
  # ---------------------------------------------------------------------------
  web:
    build:
      context: ./web
      args:
        # NEXT_PUBLIC_* are inlined at build time -> must be passed as build args.
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        NEXT_PUBLIC_BIT_SUPABASE_URL: ${NEXT_PUBLIC_BIT_SUPABASE_URL}
        NEXT_PUBLIC_BIT_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_BIT_SUPABASE_ANON_KEY}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-}
    image: bit-web:selfhost
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      NODE_ENV: production
      PORT: "3000"
      # Re-declared at runtime for any server-side reads (build values win for client bundle).
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      NEXT_PUBLIC_BIT_SUPABASE_URL: ${NEXT_PUBLIC_BIT_SUPABASE_URL}
      NEXT_PUBLIC_BIT_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_BIT_SUPABASE_ANON_KEY}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:3000"]
      interval: 30s
      timeout: 5s
      retries: 5
    depends_on:
      kong:
        condition: service_started

  # ---------------------------------------------------------------------------
  # Supabase API gateway
  # ---------------------------------------------------------------------------
  kong:
    image: kong:2.8.1
    restart: unless-stopped
    # Interpolate env vars (ANON_KEY, SERVICE_ROLE_KEY, dashboard creds) into the
    # declarative config before starting Kong.
    entrypoint: bash -c 'eval "echo \"$$(cat ~/temp.yml)\"" > ~/kong.yml && /docker-entrypoint.sh kong docker-start'
    expose:
      - "8000"
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /home/kong/kong.yml
      KONG_DNS_ORDER: LAST,A,CNAME
      KONG_PLUGINS: request-transformer,cors,key-auth,acl,basic-auth
      KONG_NGINX_PROXY_PROXY_BUFFER_SIZE: 160k
      KONG_NGINX_PROXY_PROXY_BUFFERS: 64 160k
      SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_KEY: ${SERVICE_ROLE_KEY}
      DASHBOARD_USERNAME: ${STUDIO_BASIC_AUTH_USER:-admin}
      DASHBOARD_PASSWORD: ${DASHBOARD_PASSWORD:-change-me}
    volumes:
      - ./volumes/api/kong.yml:/home/kong/temp.yml:ro
    depends_on:
      auth:
        condition: service_started
      rest:
        condition: service_started
      storage:
        condition: service_started

  # ---------------------------------------------------------------------------
  # GoTrue – authentication
  # ---------------------------------------------------------------------------
  auth:
    image: supabase/gotrue:v2.151.0
    restart: unless-stopped
    expose:
      - "9999"
    environment:
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: "9999"
      API_EXTERNAL_URL: ${SUPABASE_PUBLIC_URL}

      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://supabase_auth_admin:${POSTGRES_PASSWORD}@db:5432/postgres

      GOTRUE_SITE_URL: ${SITE_URL}
      GOTRUE_URI_ALLOW_LIST: ${ADDITIONAL_REDIRECT_URLS:-}
      GOTRUE_DISABLE_SIGNUP: ${DISABLE_SIGNUP:-true}

      GOTRUE_JWT_ADMIN_ROLES: service_role
      GOTRUE_JWT_AUD: authenticated
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      GOTRUE_JWT_EXP: ${JWT_EXPIRY:-3600}
      GOTRUE_JWT_SECRET: ${JWT_SECRET}

      GOTRUE_EXTERNAL_EMAIL_ENABLED: ${ENABLE_EMAIL_SIGNUP:-true}
      GOTRUE_MAILER_AUTOCONFIRM: ${ENABLE_EMAIL_AUTOCONFIRM:-true}
      GOTRUE_SMTP_ADMIN_EMAIL: ${SMTP_ADMIN_EMAIL:-admin@bit-gmbh.de}
      GOTRUE_SMTP_HOST: ${SMTP_HOST:-}
      GOTRUE_SMTP_PORT: ${SMTP_PORT:-}
      GOTRUE_SMTP_USER: ${SMTP_USER:-}
      GOTRUE_SMTP_PASS: ${SMTP_PASS:-}
      GOTRUE_SMTP_SENDER_NAME: ${SMTP_SENDER_NAME:-BIT GmbH}
      GOTRUE_MAILER_URLPATHS_INVITE: /auth/v1/verify
      GOTRUE_MAILER_URLPATHS_CONFIRMATION: /auth/v1/verify
      GOTRUE_MAILER_URLPATHS_RECOVERY: /auth/v1/verify
      GOTRUE_MAILER_URLPATHS_EMAIL_CHANGE: /auth/v1/verify
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9999/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # PostgREST – REST API
  # ---------------------------------------------------------------------------
  rest:
    image: postgrest/postgrest:v12.2.0
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      PGRST_DB_URI: postgres://authenticator:${POSTGRES_PASSWORD}@db:5432/postgres
      PGRST_DB_SCHEMAS: ${PGRST_DB_SCHEMAS:-public,storage,graphql_public}
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${JWT_SECRET}
      PGRST_DB_USE_LEGACY_GUCS: "false"
      PGRST_APP_SETTINGS_JWT_SECRET: ${JWT_SECRET}
      PGRST_APP_SETTINGS_JWT_EXP: ${JWT_EXPIRY:-3600}
    depends_on:
      db:
        condition: service_healthy
    command: ["postgrest"]

  # ---------------------------------------------------------------------------
  # Storage API – local filesystem backend
  # ---------------------------------------------------------------------------
  storage:
    image: supabase/storage-api:v1.11.13
    restart: unless-stopped
    expose:
      - "5000"
    environment:
      ANON_KEY: ${ANON_KEY}
      SERVICE_KEY: ${SERVICE_ROLE_KEY}
      POSTGREST_URL: http://rest:3000
      PGRST_JWT_SECRET: ${JWT_SECRET}
      DATABASE_URL: postgres://supabase_storage_admin:${POSTGRES_PASSWORD}@db:5432/postgres
      FILE_SIZE_LIMIT: ${STORAGE_FILE_SIZE_LIMIT:-52428800}
      STORAGE_BACKEND: file
      FILE_STORAGE_BACKEND_PATH: /var/lib/storage
      TENANT_ID: stub
      REGION: stub
      GLOBAL_S3_BUCKET: stub
      ENABLE_IMAGE_TRANSFORMATION: "true"
      IMGPROXY_URL: http://imgproxy:5001
    volumes:
      - storage_data:/var/lib/storage:z
    depends_on:
      db:
        condition: service_healthy
      rest:
        condition: service_started
      imgproxy:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/status"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # imgproxy – image transformations for the storage API
  # ---------------------------------------------------------------------------
  imgproxy:
    image: darthsim/imgproxy:v3.8.0
    restart: unless-stopped
    expose:
      - "5001"
    environment:
      IMGPROXY_BIND: ":5001"
      IMGPROXY_LOCAL_FILESYSTEM_ROOT: /
      IMGPROXY_USE_ETAG: "true"
      IMGPROXY_ENABLE_WEBP_DETECTION: ${IMGPROXY_ENABLE_WEBP_DETECTION:-true}
    volumes:
      - storage_data:/var/lib/storage:z
    healthcheck:
      test: ["CMD", "imgproxy", "health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # postgres-meta – database introspection (used by Studio)
  # ---------------------------------------------------------------------------
  meta:
    image: supabase/postgres-meta:v0.83.2
    restart: unless-stopped
    expose:
      - "8080"
    environment:
      PG_META_PORT: "8080"
      PG_META_DB_HOST: db
      PG_META_DB_PORT: "5432"
      PG_META_DB_NAME: postgres
      PG_META_DB_USER: supabase_admin
      PG_META_DB_PASSWORD: ${POSTGRES_PASSWORD}
    depends_on:
      db:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Studio – optional admin UI (exposed via Caddy + basic auth, see Caddyfile)
  # ---------------------------------------------------------------------------
  studio:
    image: supabase/studio:20240729-ce42139
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      STUDIO_PG_META_URL: http://meta:8080
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      DEFAULT_ORGANIZATION_NAME: ${STUDIO_DEFAULT_ORGANIZATION:-BIT GmbH}
      DEFAULT_PROJECT_NAME: ${STUDIO_DEFAULT_PROJECT:-BIT}
      SUPABASE_URL: http://kong:8000
      SUPABASE_PUBLIC_URL: ${SUPABASE_PUBLIC_URL}
      SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_KEY: ${SERVICE_ROLE_KEY}
      AUTH_JWT_SECRET: ${JWT_SECRET}
    depends_on:
      meta:
        condition: service_started
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/api/profile').then((r)=>{if(!r.ok)throw new Error()}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ---------------------------------------------------------------------------
  # Postgres (supabase/postgres ships the required roles + extensions)
  # ---------------------------------------------------------------------------
  db:
    image: supabase/postgres:15.1.0.147
    restart: unless-stopped
    # Only exposed on localhost so migration tooling (pg_dump/psql) can reach it.
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_HOST: /var/run/postgresql
      PGPORT: "5432"
      POSTGRES_PORT: "5432"
      POSTGRES_DB: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGPASSWORD: ${POSTGRES_PASSWORD}
      # Consumed by the init scripts below.
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXP: ${JWT_EXPIRY:-3600}
    volumes:
      - db_data:/var/lib/postgresql/data:z
      - ./volumes/db/init/01-roles.sql:/docker-entrypoint-initdb.d/init-scripts/01-roles.sql:ro
      - ./volumes/db/init/02-jwt.sql:/docker-entrypoint-initdb.d/init-scripts/02-jwt.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -h localhost"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  db_data:
  storage_data:
  caddy_data:
  caddy_config:
